services:
  - type: web
    name: dynamic-pdf-template-api
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install --include=dev && npx puppeteer browsers install chrome && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PUPPETEER_CACHE_DIR
        value: ./.cache/puppeteer
      - key: ALLOW_ALL_ORIGINS
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
